<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Detail Page — User Stories Tracker</title>
<script src="https://kit.fontawesome.com/da08280601.js" crossorigin="anonymous"></script>
<style>
/* ── Reset & Base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal-50:  #f2fdff;
  --teal-200: #a1d4e0;
  --teal-400: #5294a9;
  --teal-500: #3d7d93;
  --teal-600: #2d677c;
  --teal-700: #244f5f;
  --gold-50:  #fff7e6;
  --gold-500: #c8982c;
  --gold-700: #7a6217;
  --green-50:  #daf5e8;
  --green-600: #007f6a;
  --red-50:   #fff4f5;
  --red-500:  #f44336;
  --red-700:  #630606;
  --amber-50: #fffbf2;
  --amber-500:#c76028;
  --purple-50:#f5f4ff;
  --purple-600:#583082;
  --gray-50:  #f9f9f9;
  --gray-100: #f4f4f4;
  --gray-200: #e9e9e9;
  --gray-300: #dddddd;
  --gray-600: #c6c6c6;
  --gray-700: #aeaeae;
  --gray-800: #959595;
  --gray-900: #7e7e7e;
  --dark:     #2d2d2d;
  --font: "Segoe UI", system-ui, -apple-system, sans-serif;
}
body { font-family: var(--font); background: var(--gray-100); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }

/* ── Top Bar ──────────────────────────────────────── */
.topbar {
  background: var(--teal-700);
  color: white;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.topbar-title { font-size: 15px; font-weight: 700; letter-spacing: .02em; white-space: nowrap; }
.topbar-sub   { font-size: 11px; opacity: .7; margin-top: 1px; }
.topbar-spacer { flex: 1; }
.overall-progress { display: flex; align-items: center; gap: 10px; }
.progress-track { width: 160px; height: 6px; background: rgba(255,255,255,.2); border-radius: 3px; overflow: hidden; }
.progress-fill  { height: 100%; background: #85d8b8; border-radius: 3px; transition: width .4s; }
.progress-label { font-size: 12px; opacity: .85; min-width: 60px; text-align: right; }
.topbar-btn {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: white; border-radius: 6px; padding: 5px 12px; font-size: 12px;
  cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s;
}
.topbar-btn:hover { background: rgba(255,255,255,.22); }
.flag-count-badge {
  background: var(--red-500); color: white; border-radius: 10px;
  padding: 1px 6px; font-size: 11px; font-weight: 700; min-width: 18px; text-align: center;
}

/* ── Layout ───────────────────────────────────────── */
.layout { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ──────────────────────────────────────── */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: white; border-right: 1px solid var(--gray-200);
  padding: 20px 0;
  position: sticky; top: 56px; height: calc(100vh - 56px);
  overflow-y: auto;
}
.sidebar-section { padding: 6px 16px; margin-bottom: 4px; }
.sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--gray-800); margin-bottom: 8px; }
.sidebar-nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 6px; cursor: pointer;
  text-decoration: none; color: var(--dark); font-size: 13px;
  transition: background .12s;
  gap: 8px;
}
.sidebar-nav-item:hover { background: var(--gray-100); }
.sidebar-nav-item.active { background: var(--teal-50); color: var(--teal-600); font-weight: 600; }
.sidebar-nav-item .nav-name { flex: 1; }
.sidebar-mini-bar { height: 4px; background: var(--gray-200); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.sidebar-mini-fill { height: 100%; background: var(--teal-400); border-radius: 2px; transition: width .4s; }
.sidebar-count { font-size: 11px; color: var(--gray-800); white-space: nowrap; }

.filter-chips { padding: 6px 16px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1.5px solid transparent; transition: all .12s;
  background: var(--gray-100); color: var(--gray-900); border-color: var(--gray-300);
}
.chip.active { background: var(--teal-500); color: white; border-color: var(--teal-500); }
.chip:hover:not(.active) { border-color: var(--teal-400); color: var(--teal-600); }

.divider { height: 1px; background: var(--gray-200); margin: 8px 16px; }

/* ── Main Content ─────────────────────────────────── */
.main { flex: 1; padding: 28px 32px; overflow-y: auto; max-width: 900px; margin: auto; }

/* ── Section Header ───────────────────────────────── */
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; margin-top: 8px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--teal-200);
}
.section-header h2 { font-size: 18px; font-weight: 700; color: var(--teal-700); }
.section-header .section-progress { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-800); }
.section-header .section-progress .mini-bar { width: 80px; height: 5px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
.section-header .section-progress .mini-fill { height: 100%; background: var(--teal-400); border-radius: 3px; transition: width .4s; }

/* ── Story Card ───────────────────────────────────── */
.story-card {
  background: white; border: 1px solid var(--gray-200); border-radius: 10px;
  margin-bottom: 16px; overflow: hidden;
  transition: box-shadow .15s;
}
.story-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }
.story-card.complete { border-color: var(--green-600); }
.story-card.complete .card-header { background: var(--green-50); }
.story-card.flagged-issue  { border-color: var(--red-500); }
.story-card.flagged-question { border-color: #5294a9; }

.card-header {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; background: var(--gray-50);
  border-bottom: 1px solid var(--gray-200); cursor: pointer;
  user-select: none;
}
.card-header:hover { background: var(--teal-50); }
.story-id { font-size: 11px; font-weight: 700; color: var(--teal-500); font-family: monospace; white-space: nowrap; padding-top: 1px; }
.story-title { font-size: 14px; font-weight: 600; color: var(--dark); flex: 1; }
.story-title-row { flex: 1; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.tag {
  font-size: 10px; font-weight: 600; padding: 1px 7px;
  border-radius: 10px; white-space: nowrap;
}
.tag-both     { background: var(--gray-100); color: var(--gray-900); border: 1px solid var(--gray-300); }
.tag-std      { background: var(--green-50); color: var(--green-600); border: 1px solid #85d8b8; }
.tag-mg       { background: var(--amber-50); color: var(--amber-500); border: 1px solid #f0b160; }
.tag-aside    { background: var(--purple-50); color: var(--purple-600); border: 1px solid #bcb2ff; }
.tag-int      { background: var(--purple-50); color: var(--purple-600); border: 1px solid #bcb2ff; }
.tag-new      { background: var(--green-50); color: var(--green-600); border: 1px solid #85d8b8; }
.tag-comp     { background: var(--teal-50); color: var(--teal-600); border: 1px solid var(--teal-200); }

.card-status { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.done      { background: var(--green-600); }
.status-dot.partial   { background: var(--gold-500); }
.status-dot.none      { background: var(--gray-600); }
.collapse-icon { color: var(--gray-700); font-size: 11px; transition: transform .2s; }
.story-card.collapsed .collapse-icon { transform: rotate(-90deg); }

.card-body { padding: 16px; }
.story-statement { display: grid; grid-template-columns: 68px 1fr; gap: 2px 12px; margin-bottom: 16px; }
.stmt-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--teal-500); padding: 3px 0; align-self: start; }
.stmt-value { font-size: 13px; color: var(--dark); padding: 3px 0; border-bottom: 1px solid var(--gray-200); line-height: 1.5; }
.stmt-value:last-child { border-bottom: none; }

.ac-section { margin-top: 4px; }
.ac-label {
  font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  color: var(--gray-900); margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
  padding: 4px 0;
}
.ac-label:hover { color: var(--teal-600); }
.ac-label .ac-chevron { font-size: 10px; color: var(--gray-700); transition: transform .2s; }
.ac-section.collapsed .ac-chevron { transform: rotate(-90deg); }
.ac-section.collapsed .ac-items { display: none; }
.ac-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--gray-100);
}
.ac-item:last-child { border-bottom: none; }
.ac-item input[type="checkbox"] { width: 15px; height: 15px; margin-top: 1px; flex-shrink: 0; cursor: pointer; accent-color: var(--teal-500); }
.ac-item label { font-size: 13px; line-height: 1.45; cursor: pointer; flex: 1; }
.ac-item.checked label { text-decoration: line-through; color: var(--gray-800); }

.note-box {
  margin-top: 12px; background: var(--gold-50);
  border: 1px solid #f0d080; border-radius: 6px; padding: 8px 12px;
  font-size: 12px; color: #5c4a00; line-height: 1.5;
}
.note-box strong { color: var(--gold-700); }

/* ── Flag System ──────────────────────────────────── */
.card-footer { padding: 10px 16px; border-top: 1px solid var(--gray-100); display: flex; align-items: center; gap: 10px; }
.flag-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; padding: 4px 10px; border-radius: 6px;
  cursor: pointer; border: 1px solid var(--gray-300);
  background: none; color: var(--gray-900); transition: all .12s;
}
.flag-btn:hover { border-color: var(--red-500); color: var(--red-500); }
.flag-btn.has-flag { border-color: var(--red-500); color: var(--red-500); background: var(--red-50); }
.flag-btn.has-flag.type-question { border-color: var(--teal-400); color: var(--teal-600); background: var(--teal-50); }

.flag-display {
  flex: 1; font-size: 12px; padding: 6px 10px; border-radius: 6px;
  display: flex; align-items: flex-start; gap: 8px;
}
.flag-display.issue    { background: var(--red-50); border: 1px solid #fca5a5; color: #7f1d1d; }
.flag-display.question { background: var(--teal-50); border: 1px solid var(--teal-200); color: var(--teal-700); }
.flag-display .flag-text { flex: 1; line-height: 1.4; }
.flag-display .flag-type-label { font-weight: 700; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
.flag-display .clear-flag { background: none; border: none; cursor: pointer; color: inherit; opacity: .6; font-size: 14px; line-height: 1; padding: 0 2px; }
.flag-display .clear-flag:hover { opacity: 1; }

/* ── Flag Modal ───────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-panel {
  background: white; border-radius: 12px; width: 420px; max-width: 95vw;
  box-shadow: 0 8px 40px rgba(0,0,0,.2); padding: 24px;
  transform: translateY(10px); transition: transform .2s;
}
.modal-overlay.open .modal-panel { transform: translateY(0); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-story-id { font-size: 12px; color: var(--gray-800); margin-bottom: 16px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px; }
.modal-field textarea {
  width: 100%; border: 1.5px solid var(--gray-300); border-radius: 6px;
  padding: 8px 10px; font-size: 13px; font-family: var(--font); resize: vertical;
  outline: none; transition: border-color .15s;
}
.modal-field textarea:focus { border-color: var(--teal-400); }
.flag-type-select { display: flex; gap: 8px; }
.type-opt { flex: 1; }
.type-opt input[type="radio"] { display: none; }
.type-opt label {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 8px 12px; border: 2px solid var(--gray-300); border-radius: 7px;
  cursor: pointer; font-size: 13px; font-weight: 600; transition: all .12s;
}
.type-opt input:checked + label.issue    { border-color: var(--red-500); background: var(--red-50); color: var(--red-700); }
.type-opt input:checked + label.question { border-color: var(--teal-400); background: var(--teal-50); color: var(--teal-600); }
.type-opt label:hover { border-color: var(--gray-700); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.btn-cancel { padding: 7px 16px; border: 1px solid var(--gray-300); border-radius: 6px; background: none; cursor: pointer; font-size: 13px; }
.btn-cancel:hover { background: var(--gray-100); }
.btn-save { padding: 7px 16px; border: none; border-radius: 6px; background: var(--teal-500); color: white; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-save:hover { background: var(--teal-400); }

/* ── Flags Panel ──────────────────────────────────── */
.flags-panel {
  position: fixed; top: 56px; right: 0; width: 340px; height: calc(100vh - 56px);
  background: white; border-left: 1px solid var(--gray-200);
  z-index: 150; transform: translateX(100%); transition: transform .25s cubic-bezier(.25,.46,.45,.94);
  display: flex; flex-direction: column;
}
.flags-panel.open { transform: translateX(0); }
.flags-panel-header {
  padding: 16px 20px; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.flags-panel-header h3 { font-size: 15px; font-weight: 700; }
.close-panel { background: none; border: none; cursor: pointer; color: var(--gray-800); font-size: 18px; padding: 2px 6px; border-radius: 4px; }
.close-panel:hover { background: var(--gray-100); }
.flags-list { overflow-y: auto; flex: 1; padding: 12px; }
.flag-panel-item {
  border: 1px solid var(--gray-200); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
  font-size: 13px;
}
.flag-panel-item.issue    { border-color: #fca5a5; background: var(--red-50); }
.flag-panel-item.question { border-color: var(--teal-200); background: var(--teal-50); }
.flag-panel-id   { font-size: 11px; font-family: monospace; font-weight: 700; color: var(--teal-500); }
.flag-panel-type { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; float: right; }
.flag-panel-type.issue    { color: var(--red-500); }
.flag-panel-type.question { color: var(--teal-500); }
.flag-panel-title { font-weight: 600; font-size: 12px; margin: 3px 0; color: var(--dark); }
.flag-panel-note  { color: var(--dark); line-height: 1.4; margin-top: 4px; }
.empty-flags { text-align: center; padding: 40px 20px; color: var(--gray-800); font-size: 13px; }
.empty-flags i { display: block; font-size: 28px; margin-bottom: 8px; color: var(--gray-600); }

/* ── Tag Legend ───────────────────────────────────── */
.legend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
  margin-bottom: 4px;
}
.legend-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  background: white; border: 1px solid var(--gray-200); border-radius: 8px;
  flex-direction: column;
}
.legend-item .tag { flex-shrink: 0; margin-top: 2px; }
.legend-item-text { font-size: 12px; color: var(--gray-900); line-height: 1.45; }
.legend-item-text strong { display: block; font-size: 12px; color: var(--dark); margin-bottom: 2px; }

/* ── Collapsed body ───────────────────────────────── */
.story-card.collapsed .card-body,
.story-card.collapsed .card-footer { display: none; }

/* ── Hidden ───────────────────────────────────────── */
.hidden { display: none !important; }

/* ── Filter bar ───────────────────────────────────── */
.filter-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px; padding: 12px 16px;
  background: white; border: 1px solid var(--gray-200); border-radius: 8px;
}
.filter-bar-label { font-size: 12px; font-weight: 600; color: var(--gray-800); white-space: nowrap; }
.filter-chips-inline { display: flex; flex-wrap: wrap; gap: 6px; }
.filter-chips-inline .chip { font-size: 11px; padding: 3px 10px; }
.reset-btn { margin-left: auto; background: none; border: 1px solid var(--gray-300); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; color: var(--gray-900); }
.reset-btn:hover { background: var(--gray-100); }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div>
    <div class="topbar-title">Customer Detail Page</div>
    <div class="topbar-sub">User Stories Tracker</div>
  </div>
  <div class="topbar-spacer"></div>
  <div class="overall-progress">
    <div class="progress-track"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>
    <div class="progress-label" id="overall-label">0 / 0</div>
  </div>
  <button class="topbar-btn" onclick="toggleFlagsPanel()">
    <i class="fa-solid fa-flag"></i> Flags
    <span class="flag-count-badge" id="flag-count" style="display:none">0</span>
  </button>
  <button class="topbar-btn" onclick="resetAll()" title="Clear all progress">
    <i class="fa-solid fa-rotate-left"></i> Reset
  </button>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Components</div>
      <a class="sidebar-nav-item active" onclick="filterBySection('all', this)" href="#">
        <span class="nav-name">All Stories</span>
        <span class="sidebar-count" id="count-all">0</span>
      </a>
      <div id="sidebar-nav"></div>
    </div>
    <div class="divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Filter by Status</div>
      <div class="filter-chips">
        <span class="chip" onclick="filterByStatus('all', this)">All</span>
        <span class="chip" onclick="filterByStatus('complete', this)">Done</span>
        <span class="chip" onclick="filterByStatus('partial', this)">In Progress</span>
        <span class="chip" onclick="filterByStatus('none', this)">Not Started</span>
        <span class="chip" onclick="filterByStatus('flagged', this)">Flagged</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Filter by Tag</div>
      <div class="filter-chips">
        <span class="chip active" onclick="filterByTag('all', this)">All</span>
        <span class="chip" onclick="filterByTag('both', this)">Both Types</span>
        <span class="chip" onclick="filterByTag('std', this)">Standard Only</span>
        <span class="chip" onclick="filterByTag('mg', this)">Mgmt Group Only</span>
        <span class="chip" onclick="filterByTag('aside', this)">Uses Aside</span>
        <span class="chip" onclick="filterByTag('int', this)">Integration</span>
        <span class="chip" onclick="filterByTag('new', this)">New/Updated</span>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div id="tag-legend">
      <div class="section-header" style="margin-top:0">
        <h2 style="font-size:15px">Tag Definitions</h2>
      </div>
      <div class="legend-grid" id="legend-grid"></div>
      <div style="height:8px"></div>
    </div>
    <div id="main-content"></div>
  </main>
</div>

<!-- Flags Panel -->
<div class="flags-panel" id="flags-panel">
  <div class="flags-panel-header">
    <h3><i class="fa-solid fa-flag" style="color:var(--red-500);margin-right:8px"></i>Flags &amp; Questions</h3>
    <button class="close-panel" onclick="toggleFlagsPanel()">×</button>
  </div>
  <div class="flags-list" id="flags-list"></div>
</div>

<!-- Flag Modal -->
<div class="modal-overlay" id="flag-modal" onclick="handleModalClick(event)">
  <div class="modal-panel">
    <div class="modal-title" id="modal-title">Add Flag</div>
    <div class="modal-story-id" id="modal-story-id"></div>
    <div class="modal-field">
      <label>Flag Type</label>
      <div class="flag-type-select">
        <div class="type-opt">
          <input type="radio" name="flag-type" id="type-issue" value="issue" checked>
          <label for="type-issue" class="issue"><i class="fa-solid fa-circle-exclamation"></i> Issue</label>
        </div>
        <div class="type-opt">
          <input type="radio" name="flag-type" id="type-question" value="question">
          <label for="type-question" class="question"><i class="fa-solid fa-circle-question"></i> Question</label>
        </div>
      </div>
    </div>
    <div class="modal-field">
      <label for="flag-note">Note</label>
      <textarea id="flag-note" rows="4" placeholder="Describe the issue or question…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveFlag()">Save Flag</button>
    </div>
  </div>
</div>

<script>
// ── Data ────────────────────────────────────────────────────────────────────

const STORIES = [
  {
    section: "Design System",
    id: "DS-01", title: "Design Tokens Update",
    tags: ["both"],

const TAG_META = {
  both:  { cls: "tag-both",  label: "Both customer types" },
  std:   { cls: "tag-std",   label: "Standard Customer only" },
  mg:    { cls: "tag-mg",    label: "Management Group only" },
  aside: { cls: "tag-aside", label: "Uses aside" },
  int:   { cls: "tag-int",   label: "Integration" },
  new:   { cls: "tag-new",   label: "New / Updated Approach" },
};

const SECTIONS = [...new Set(STORIES.map(s => s.section))];

// ── State ────────────────────────────────────────────────────────────────────

const LS_KEY = "cms-user-stories-v3";

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

let state = loadState();
// state.checked[storyId][acIdx] = bool
// state.flags[storyId] = { type, note }
if (!state.checked) state.checked = {};
if (!state.flags)   state.flags   = {};

// ── Filters ──────────────────────────────────────────────────────────────────

let activeSection  = 'all';
let activeStatus   = 'all';
let activeTag      = 'all';

// ── Render ───────────────────────────────────────────────────────────────────

function getStoryChecked(id) {
  return state.checked[id] || {};
}
function countChecked(id) {
  const story = STORIES.find(s => s.id === id);
  if (!story) return { done: 0, total: story.ac.length };
  const ch = getStoryChecked(id);
  return { done: Object.values(ch).filter(Boolean).length, total: story.ac.length };
}
function getStatus(id) {
  const { done, total } = countChecked(id);
  if (done === 0) return 'none';
  if (done === total) return 'complete';
  return 'partial';
}

function renderAll() {
  renderSidebarNav();
  renderStories();
  updateOverallProgress();
  renderFlagsPanel();
}

function renderSidebarNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  SECTIONS.forEach(sec => {
    const secStories = STORIES.filter(s => s.section === sec);
    const done = secStories.filter(s => getStatus(s.id) === 'complete').length;
    const pct  = Math.round((done / secStories.length) * 100);

    const el = document.createElement('div');
    el.innerHTML = `
      <a class="sidebar-nav-item${activeSection === sec ? ' active' : ''}" onclick="filterBySection('${sec}', this)" href="#">
        <div class="nav-name" style="font-size:12px">${sec.replace('Component','')}</div>
        <span class="sidebar-count">${done}/${secStories.length}</span>
      </a>
      <div style="padding: 0 12px 6px">
        <div class="sidebar-mini-bar"><div class="sidebar-mini-fill" style="width:${pct}%"></div></div>
      </div>`;
    nav.appendChild(el);
  });

  // Update "all" count
  const allDone = STORIES.filter(s => getStatus(s.id) === 'complete').length;
  document.getElementById('count-all').textContent = `${allDone}/${STORIES.length}`;
}

function renderStories() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const filtered = STORIES.filter(s => {
    if (activeSection !== 'all' && s.section !== activeSection) return false;
    if (activeStatus !== 'all') {
      const st = getStatus(s.id);
      if (activeStatus === 'flagged') { if (!state.flags[s.id]) return false; }
      else if (st !== activeStatus) return false;
    }
    if (activeTag !== 'all' && !s.tags.includes(activeTag)) return false;
    return true;
  });

  // Group by section
  const grouped = {};
  filtered.forEach(s => {
    if (!grouped[s.section]) grouped[s.section] = [];
    grouped[s.section].push(s);
  });

  if (filtered.length === 0) {
    main.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--gray-800)">
      <i class="fa-regular fa-circle-xmark" style="font-size:32px;display:block;margin-bottom:12px;color:var(--gray-600)"></i>
      No stories match the current filters.
    </div>`;
    return;
  }

  Object.entries(grouped).forEach(([sec, stories]) => {
    const secStories = STORIES.filter(s => s.section === sec);
    const done = secStories.filter(s => getStatus(s.id) === 'complete').length;
    const pct  = Math.round((done / secStories.length) * 100);

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.id = `section-${sec}`;
    hdr.innerHTML = `
      <h2>${sec}</h2>
      <div class="section-progress">
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        <span>${done}/${secStories.length}</span>
      </div>`;
    main.appendChild(hdr);

    stories.forEach(story => {
      main.appendChild(buildStoryCard(story));
    });
  });
}

function buildStoryCard(story) {
  const { done, total } = countChecked(story.id);
  const status  = getStatus(story.id);
  const flag    = state.flags[story.id] || null;
  const checked = getStoryChecked(story.id);

  const card = document.createElement('div');
  card.className = `story-card ${status === 'complete' ? 'complete' : ''} ${flag ? 'flagged-' + flag.type : ''}`;
  card.id = `card-${story.id}`;

  // Tags HTML
  const tagsHtml = story.tags
    .map(t => `<span class="tag ${TAG_META[t].cls}">${TAG_META[t].label}</span>`)
    .join('');

  // Status dot
  const dotCls = status === 'complete' ? 'done' : status === 'partial' ? 'partial' : 'none';
  const statusLabel = status === 'complete' ? 'Complete' : status === 'partial' ? `${done}/${total}` : 'Not started';

  // AC items
  const acHtml = story.ac.map((ac, i) => {
    const isChecked = !!checked[i];
    return `<div class="ac-item ${isChecked ? 'checked' : ''}" id="ac-${story.id}-${i}">
      <input type="checkbox" id="cb-${story.id}-${i}" ${isChecked ? 'checked' : ''}
        onchange="toggleAC('${story.id}', ${i}, this.checked)">
      <label for="cb-${story.id}-${i}">${ac}</label>
    </div>`;
  }).join('');

  // Note
  const noteHtml = story.note
    ? `<div class="note-box"><strong>📝 Note:</strong> ${story.note}</div>`
    : '';

  // Flag display
  const flagHtml = flag
    ? `<div class="flag-display ${flag.type}">
        <span class="flag-type-label"><i class="fa-solid fa-${flag.type === 'issue' ? 'circle-exclamation' : 'circle-question'}"></i> ${flag.type}</span>
        <span class="flag-text">${escapeHtml(flag.note)}</span>
        <button class="clear-flag" onclick="clearFlag('${story.id}')" title="Remove flag">×</button>
       </div>`
    : '';

  const flagBtnCls = flag ? `has-flag type-${flag.type}` : '';
  const flagBtnIcon = flag
    ? (flag.type === 'issue' ? 'fa-circle-exclamation' : 'fa-circle-question')
    : 'fa-flag';
  const flagBtnLabel = flag ? 'Edit Flag' : 'Add Flag';

  card.innerHTML = `
    <div class="card-header" onclick="toggleCollapse('${story.id}')">
      <div class="story-id">${story.id}</div>
      <div class="story-title-row">
        <div class="story-title">${story.title}</div>
        <div class="card-tags">${tagsHtml}</div>
      </div>
      <div class="card-status">
        <div class="status-dot ${dotCls}" title="${statusLabel}"></div>
        <span style="font-size:11px;color:var(--gray-800);white-space:nowrap">${statusLabel}</span>
        <i class="fa-solid fa-chevron-down collapse-icon"></i>
      </div>
    </div>
    <div class="card-body">
      <div class="story-statement">
        <span class="stmt-label">As a</span>
        <span class="stmt-value">${story.asA}</span>
        <span class="stmt-label">I want</span>
        <span class="stmt-value">${story.iWant}</span>
        <span class="stmt-label">So that</span>
        <span class="stmt-value">${story.soThat}</span>
      </div>
      <div class="ac-section collapsed">
        <div class="ac-label" onclick="this.closest('.ac-section').classList.toggle('collapsed')">
          Acceptance Criteria
          <i class="fa-solid fa-chevron-down ac-chevron"></i>
        </div>
        <div class="ac-items">${acHtml}</div>
      </div>
      ${noteHtml}
    </div>
    <div class="card-footer">
      <button class="flag-btn ${flagBtnCls}" onclick="openFlagModal('${story.id}')">
        <i class="fa-solid ${flagBtnIcon}"></i> ${flagBtnLabel}
      </button>
      ${flagHtml}
    </div>`;

  return card;
}

function updateOverallProgress() {
  const total = STORIES.length;
  const done  = STORIES.filter(s => getStatus(s.id) === 'complete').length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-label').textContent = `${done} / ${total} stories`;
}

function renderFlagsPanel() {
  const list = document.getElementById('flags-list');
  const entries = Object.entries(state.flags).filter(([,v]) => v);
  const badge = document.getElementById('flag-count');

  badge.textContent = entries.length;
  badge.style.display = entries.length > 0 ? 'inline-block' : 'none';

  if (entries.length === 0) {
    list.innerHTML = `<div class="empty-flags">
      <i class="fa-regular fa-flag"></i>
      No flags yet. Use the "Add Flag" button on any story to log an issue or question.
    </div>`;
    return;
  }

  list.innerHTML = entries.map(([id, flag]) => {
    const story = STORIES.find(s => s.id === id);
    return `<div class="flag-panel-item ${flag.type}">
      <span class="flag-panel-id">${id}</span>
      <span class="flag-panel-type ${flag.type}">${flag.type}</span>
      <div class="flag-panel-title">${story ? story.title : id}</div>
      <div class="flag-panel-note">${escapeHtml(flag.note)}</div>
    </div>`;
  }).join('');
}

// ── Interactions ─────────────────────────────────────────────────────────────

function toggleAC(storyId, idx, checked) {
  if (!state.checked[storyId]) state.checked[storyId] = {};
  state.checked[storyId][idx] = checked;
  saveState(state);
  refreshCard(storyId);
  updateOverallProgress();
  renderSidebarNav();
}

function refreshCard(storyId) {
  const old  = document.getElementById(`card-${storyId}`);
  if (!old) return;
  const story = STORIES.find(s => s.id === storyId);
  const fresh = buildStoryCard(story);
  if (old.classList.contains('collapsed')) fresh.classList.add('collapsed');
  old.replaceWith(fresh);

  // Update section progress
  const sec = story.section;
  const secStories = STORIES.filter(s => s.section === sec);
  const done = secStories.filter(s => getStatus(s.id) === 'complete').length;
  const pct  = Math.round((done / secStories.length) * 100);
  const secEl = document.getElementById(`section-${sec}`);
  if (secEl) {
    const fill = secEl.querySelector('.mini-fill');
    const lbl  = secEl.querySelector('.section-progress span');
    if (fill) fill.style.width = pct + '%';
    if (lbl)  lbl.textContent = `${done}/${secStories.length}`;
  }
}

function toggleCollapse(storyId) {
  const card = document.getElementById(`card-${storyId}`);
  if (card) card.classList.toggle('collapsed');
}

// ── Filters ──────────────────────────────────────────────────────────────────

function filterBySection(sec, el) {
  activeSection = sec;
  document.querySelectorAll('.sidebar-nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  renderStories();
}

function filterByStatus(status, el) {
  activeStatus = status;
  document.querySelectorAll('.sidebar-section .chip').forEach(c => {
    if (c.onclick && c.onclick.toString().includes('filterByStatus')) c.classList.remove('active');
  });
  if (el) el.classList.add('active');
  renderStories();
}

function filterByTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.sidebar-section .chip').forEach(c => {
    if (c.onclick && c.onclick.toString().includes('filterByTag')) c.classList.remove('active');
  });
  if (el) el.classList.add('active');
  renderStories();
}

// ── Flag Modal ────────────────────────────────────────────────────────────────

let currentFlagStoryId = null;

function openFlagModal(storyId) {
  currentFlagStoryId = storyId;
  const story = STORIES.find(s => s.id === storyId);
  const existing = state.flags[storyId];

  document.getElementById('modal-title').textContent = existing ? 'Edit Flag' : 'Add Flag';
  document.getElementById('modal-story-id').textContent = `${storyId} — ${story ? story.title : ''}`;
  document.getElementById('flag-note').value = existing ? existing.note : '';
  document.querySelector(`input[value="${existing ? existing.type : 'issue'}"]`).checked = true;
  document.getElementById('flag-modal').classList.add('open');
  setTimeout(() => document.getElementById('flag-note').focus(), 200);
}

function saveFlag() {
  const note = document.getElementById('flag-note').value.trim();
  if (!note) { document.getElementById('flag-note').style.borderColor = 'var(--red-500)'; return; }
  const type = document.querySelector('input[name="flag-type"]:checked').value;
  state.flags[currentFlagStoryId] = { type, note };
  saveState(state);
  closeModal();
  refreshCard(currentFlagStoryId);
  renderFlagsPanel();
}

function clearFlag(storyId) {
  delete state.flags[storyId];
  saveState(state);
  refreshCard(storyId);
  renderFlagsPanel();
}

function closeModal() {
  document.getElementById('flag-modal').classList.remove('open');
  document.getElementById('flag-note').style.borderColor = '';
  currentFlagStoryId = null;
}

function handleModalClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

// ── Flags Panel ───────────────────────────────────────────────────────────────

function toggleFlagsPanel() {
  document.getElementById('flags-panel').classList.toggle('open');
}

// ── Reset ─────────────────────────────────────────────────────────────────────

function resetAll() {
  if (!confirm('Clear all progress and flags? This cannot be undone.')) return;
  state = { checked: {}, flags: {} };
  saveState(state);
  renderAll();
}

// ── Escape HTML ───────────────────────────────────────────────────────────────

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    document.getElementById('flags-panel').classList.remove('open');
  }
});

// ── Tag Legend ────────────────────────────────────────────────────────────────

const LEGEND = [
  { tag: 'both',  label: 'Both customer types',      desc: 'Story applies to both Standard Customer and Management/Franchise Group accounts.' },
  { tag: 'std',   label: 'Standard Customer only',   desc: 'Story applies only to Standard Customer accounts (individual properties).' },
  { tag: 'mg',    label: 'Management Group only',    desc: 'Story applies only to Management/Franchise Group accounts (parent entities with multiple properties).' },
  { tag: 'aside', label: 'Uses aside',               desc: 'Feature opens or uses the existing aside/flyout component rather than a full page or modal.' },
  { tag: 'int',   label: 'Integration',              desc: 'Integrates existing Platinum functionality into this page.' },
  { tag: 'new',   label: 'New / Updated Approach',   desc: 'Not necessarily brand-new functionality, but a new navigation pattern or updated behavior compared to Gold.' },
];

function renderLegend() {
  const grid = document.getElementById('legend-grid');
  grid.innerHTML = LEGEND.map(({ tag, label, desc }) => {
    const meta = TAG_META[tag];
    return `<div class="legend-item">
      <span class="tag ${meta.cls}">${label}</span>
      <div class="legend-item-text">${desc}</div>
    </div>`;
  }).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderLegend();
renderAll();
</script>
